name: React Doctor

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Scan changed React files
        if: github.event_name == 'pull_request'
        uses: millionco/react-doctor@99f6a6ad1cc41828172b26f17a84bcf2d66ff17c
        with:
          diff: main
          github-token: ${{ github.event.pull_request.head.repo.full_name == github.repository && secrets.GITHUB_TOKEN || '' }}
          fail-on: none
          offline: true
          verbose: false

      - name: Scan React project
        if: github.event_name != 'pull_request'
        uses: millionco/react-doctor@99f6a6ad1cc41828172b26f17a84bcf2d66ff17c
        with:
          fail-on: none
          offline: true
          verbose: false
